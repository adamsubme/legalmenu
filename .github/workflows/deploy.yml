name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README/**'

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Debug secrets
        run: |
          echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
          echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
          echo "SERVER_SSH_KEY set: ${{ secrets.SERVER_SSH_KEY != '' }}"

      - name: Check if secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ] || [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::notice::Deploy secrets not configured - skipping deploy"
            echo "SKIP_DEPLOY=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_DEPLOY=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        uses: actions/checkout@v4

      - name: Check for secrets
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: |
          echo "🔍 Scanning for leaked secrets..."

          # API key patterns only (avoid false positives from password HTML inputs)
          PATTERNS=(
            "sk-proj-[a-zA-Z0-9_-]{20,}"
            "GOCSPX-[a-zA-Z0-9_-]{20,}"
            "ghp_[a-zA-Z0-9]{36,}"
            "AKIA[A-Z0-9]{16}"
            "ntn_[a-zA-Z0-9_-]{40,}"
          )

          FOUND=0
          # Scan source code only
          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" dashboard/src/ 2>/dev/null | grep -v node_modules | grep -v ".next"; then
              echo "❌ Potential secret found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "❌ Secrets found in code! Clean before deploying."
            exit 1
          fi
          echo "✓ No secrets detected"

      - name: Setup Node.js
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: npm ci --legacy-peer-deps
        working-directory: dashboard

      - name: Run lint
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: npm run lint
        working-directory: dashboard

      - name: Run type check
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: npx tsc --noEmit
        working-directory: dashboard

      - name: Run tests
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: npm test
        working-directory: dashboard

      - name: Build application
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        run: npm run build
        working-directory: dashboard
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy via SSH
        if: steps.check-secrets.outputs.SKIP_DEPLOY == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs:
            - NODE_ENV
          command_timeout: 600
          script: |
            set -e

            echo "=== Connected to server ==="
            whoami
            pwd

            cd /root/mission-control/dashboard

            echo "=== Installing dependencies ==="
            npm ci --legacy-peer-deps || { echo "npm ci failed"; exit 1; }

            echo "=== Building ==="
            npm run build || { echo "Build failed"; exit 1; }

            echo "=== Restarting PM2 ==="
            pm2 restart mission-control || pm2 start ecosystem.config.js
            pm2 save

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:3000/api/health || { echo "Health check failed"; exit 1; }

            echo "✅ Deploy successful"
        env:
          NODE_ENV: production
