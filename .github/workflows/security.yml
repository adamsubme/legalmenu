name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Skip on push - only run on pull_request or schedule
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          base-ref: ${{ github.event.pull_request.base.ref }}
      - uses: actions/dependency-review-action@v4

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for leaked secrets..."

          # Patterns to detect (in source code only, not workflow files)
          PATTERNS=(
            "sk-proj-[a-zA-Z0-9_-]{20,}"
            "admin123"
            "Mica#3000"
            "password.*=.*['\"][^'\"]{6,}"
            "api_key.*=.*['\"][^'\"]{20,}"
            "GOCSPX-[a-zA-Z0-9_-]{20,}"
            "ntn_[a-zA-Z0-9_-]{40,}"
            "ghp_[a-zA-Z0-9]{36,}"
            "AKIA[A-Z0-9]{16}"
          )

          FOUND=0
          # Scan source code only - exclude workflow files and env files
          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" dashboard/src/ 2>/dev/null | grep -v node_modules | grep -v ".next"; then
              echo "❌ Potential secret found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "❌ Secrets found in code! Clean before deploying."
            exit 1
          fi
          echo "✓ No obvious secrets detected"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
